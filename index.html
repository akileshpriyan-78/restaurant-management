<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A²D² Restaurant</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div id="auth-gate">
  <div class="gate-card">

    <div class="gate-logo">
      <h1>A²D²</h1>
      <p>Premium Restaurant</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active">Login</button>
      <button class="auth-tab">Sign Up</button>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="Enter email">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Enter password">
    </div>

    <button class="btn-submit">Login</button>

  </div>
</div>

<header>
  <div class="header-bg"></div>
  <div class="header-overlay"></div>

  <div class="header-content">
    <div class="badge">Open 8:30 AM – 10:00 PM</div>

    <h1>A²D² <span>RESTAURANT</span></h1>

    <p class="header-sub">
      Non-Veg & Veg · Fine South Indian Dining
    </p>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <div class="nav-brand">A²D²</div>

    <ul>
      <li><a href="#">Breakfast</a></li>
      <li><a href="#">Lunch</a></li>
      <li><a href="#">Dinner</a></li>
      <li><a href="#">Drinks</a></li>
    </ul>
  </div>
</nav>

<section>
  <div class="section-inner">

    <h2 class="section-title">Breakfast</h2>
    <div class="section-line"></div>

    <div class="menu-grid">

      <div class="card">
        <img class="card-img"
        src="https://images.unsplash.com/photo-1630383249896-424e482df921?w=400">

        <div class="card-body">
          <h3>Idli</h3>
          <p>Steamed rice cakes</p>
        </div>
      </div>

      <div class="card">
        <img class="card-img"
        src="https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=400">

        <div class="card-body">
          <h3>Dosa</h3>
          <p>Crispy rice crepe</p>
        </div>
      </div>

    </div>
  </div>
</section>

<footer>
  <div class="foot-logo">A²D² RESTAURANT</div>
  <p>Developed by Daniel · © 2025</p>
</footer>

<script src="script.js"></script>

</body>
</html>
